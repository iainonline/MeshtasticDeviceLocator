<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d1117" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Fabled Mesh — GPS Forwarder</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A1%3C/text%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 18px;
      }
      h1 { font-size: 18px; margin: 0; }
      .dot {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        border: 3px solid #30363d;
        transition: border-color 0.3s, background 0.3s;
      }
      .dot.live { border-color: #3fb950; background: rgba(63, 185, 80, 0.12); }
      .dot.waiting { border-color: #d4a72c; background: rgba(212, 167, 44, 0.12); }
      .dot.error { border-color: #e5534b; background: rgba(229, 83, 75, 0.12); }
      #status { font-size: 15px; color: #8b949e; max-width: 320px; }
      #stats { font-size: 13px; color: #8b949e; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      #session { font-size: 13px; color: #8b949e; }
      #session b { color: #e6edf3; letter-spacing: 0.1em; }
      input {
        font: inherit;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #161b22;
        color: #e6edf3;
        text-align: center;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        width: 160px;
      }
      button {
        font: inherit;
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid #2f81f7;
        background: #2f81f7;
        color: #fff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>📡 Fabled Mesh — GPS Forwarder</h1>
    <div id="dot" class="dot waiting">📍</div>
    <div id="status">Starting…</div>
    <div id="session"></div>
    <div id="stats"></div>
    <div id="entry" style="display:none; flex-direction:column; gap:10px; align-items:center;">
      <div>Enter the session code shown on the tracker:</div>
      <input id="code-input" maxlength="8" placeholder="ABC123" autocapitalize="characters" autocomplete="off" />
      <button id="code-go">Start broadcasting</button>
    </div>
    <script type="module" src="/src/gps-source.js"></script>
  </body>
</html>
